<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wesele Sylwii i Jakuba</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* === ZMIENNE KOLORYSTYCZNE === */
        :root {
            --bg-color: #111111;      /* Ciemne tło */
            --text-color: #DFE6E9;    /* Jasny tekst */
            --accent-color: #F5E6CC;  /* Eleganckie złoto */
            --font-main: 'Montserrat', sans-serif;
        }

        /* === RESET I BAZOWE STYLE === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* === NAGŁÓWEK WESELNY W LOGOWANIU === */
        .login-header {
            animation: fadeIn 1s ease-in-out;
            color: #D4AF37;
            width: 100%;
            margin-bottom: auto;
        }

        .login-header h1 {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        .login-header p {
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #F5E6CC;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        /* === NAGŁÓWEK WESELNY W APLIKACJI === */
        .app-header {
            margin-top: 10px;
            margin-bottom: 25px;
            animation: fadeIn 1s ease-in-out;
            color: #D4AF37;
        }

        .app-header h1 {
            font-weight: 600;
            font-size: 26px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .app-header p {
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #DFE6E9;
        }

        /* === KONTENERY WIDOKÓW === */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        /* === EKRAN LOGOWANIA (KARTA Z TŁEM) === */
        #login-screen {
            background-image: linear-gradient(to bottom, rgba(17, 17, 17, 0.35) 0%, rgba(17, 17, 17, 0.7) 55%, rgba(17, 17, 17, 0.95) 100%), url('sylwiakuba.JPG');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            min-height: 560px;
            box-sizing: border-box;
            flex-direction: column;
            justify-content: space-between;
        }

        .login-content {
            width: 100%;
            margin-top: auto;
        }

        .login-instruction {
            margin-bottom: 25px;
            font-size: 15px;
            font-weight: 300;
            line-height: 1.5;
            color: #DFE6E9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        @media (max-height: 600px) {
            #login-screen {
                min-height: 480px;
                padding: 30px 20px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .login-instruction {
                margin-bottom: 15px;
                font-size: 14px;
            }
        }

        /* === ELEMENTY FORMULARZA === */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        #guest-name {
            background-color: rgba(26, 26, 26, 0.8);
            color: #FFF;
            border: 1px solid rgba(212, 175, 55, 0.4);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* === PRZYCISKI === */
        .btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-upload {
            padding: 25px 20px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #btn-trigger-upload {
            color: #D4AF37;
            background-color: rgba(17, 17, 17, 0.85);
            border: 1px solid #D4AF37;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        #btn-trigger-upload:hover:not(:disabled) {
            background-color: #D4AF37;
            color: #111;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        #btn-trigger-upload:active {
            transform: translateY(0);
        }

        #btn-save-name {
            color: #D4AF37;
            background-color: rgba(17, 17, 17, 0.85);
            border: 1px solid #D4AF37;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        #btn-save-name:hover:not(:disabled) {
            background-color: #D4AF37;
            color: #111;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        #btn-save-name:active {
            transform: translateY(0);
        }

        /* === PASEK POSTĘPU (ZMIENIONY STYL) === */
        .progress-container {
            width: 100%;
            background-color: #2D3436; /* Ciemne tło dopasowane do inputa */
            border: 1px solid rgba(212, 175, 55, 0.4); /* Delikatna złota ramka */
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
            height: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5); /* Wewnętrzny cień dający głębię */
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #D4AF37; /* Eleganckie wesele złoto */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.7); /* Efekt lekkiego świecenia paska */
            transition: width 0.1s;
        }

        .status-text {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #D4AF37; /* Złoty tekst statusu czytelny na ciemnym tle */
        }

        /* Usunięto styl #header-photo */

        /* === STYL DLA PRZYCISKU ADMINA === */
        .btn-admin {
            background: none;
            border: 1px dashed #555;
            color: #666;
            padding: 6px 12px;
            font-size: 11px;
            font-family: var(--font-main);
            border-radius: 4px;
            cursor: pointer;
            margin-top: 40px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        /* Efekt po najechaniu myszką (na komputerze) */
        .btn-admin:hover {
            color: #cc0000;
            border-color: #cc0000;
            background-color: rgba(204, 0, 0, 0.05);
        }

        /* === ANIMACJE === */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <header class="login-header">
            <h1>Sylwia & Jakub</h1>
            <p><strong>27.06.2026</strong></p>
        </header>
        
        <div class="login-content">
            <p class="login-instruction">Zanim prześlesz zdjęcia,<br>powiedz nam, kim jesteś!</p>
            <div class="input-group">
                <input type="text" id="guest-name" placeholder="Wpisz Imię i Nazwisko">
            </div>
            <button class="btn" id="btn-save-name">Zatwierdź</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <header class="app-header">
            <h1>Sylwia & Jakub</h1>
            <p><strong>27.06.2026</strong></p>
        </header>

        <p style="margin-bottom: 30px; font-size: 18px;">
            Witaj, <strong id="display-name">Gościu</strong>!<br>
            Czekamy na Twoje ujęcia!
        </p>

        <input type="file" id="native-file-input" accept="image/*" style="display: none;">
        
        <button class="btn btn-upload" id="btn-trigger-upload">Zrób zdjęcie lub wybierz z galerii</button>
        
        <p id="limit-info" style="font-size: 14px; color: #888;"></p>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="status-text" id="status-text"></p>

        <button id="btn-admin-reset" class="btn-admin">Resetuj aplikację (Admin)</button>
    </div>

    <script>
        // ==========================================
        // KONFIGURACJA GŁÓWNA IMGBB
        // ==========================================
        const IMGBB_API_KEY = '0feacf894850b901dc9b7803b5093d05'; 
        const MAX_PHOTOS = 5; 

        // Referencje HTML
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const nameInput = document.getElementById('guest-name');
        const saveNameBtn = document.getElementById('btn-save-name');
        const displayName = document.getElementById('display-name');
        const triggerBtn = document.getElementById('btn-trigger-upload');
        const fileInput = document.getElementById('native-file-input');
        const limitInfo = document.getElementById('limit-info');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');

        // Funkcja inicjalizująca aplikację
        function initApp() {
            const savedName = localStorage.getItem('guestName');
            if (savedName) {
                displayName.textContent = savedName;
                loginScreen.classList.remove('active');
                appScreen.classList.add('active');
                updateLimitUI();
            } else {
                loginScreen.classList.add('active');
            }
        }

        // Zapisywanie imienia
        saveNameBtn.addEventListener('click', () => {
            const nameValue = nameInput.value.trim();
            if (nameValue.length > 2) {
                localStorage.setItem('guestName', nameValue);
                initApp(); 
            } else {
                alert("Proszę wpisać poprawne imię i nazwisko.");
            }
        });

        // Licznik limitu zdjęć
        function getUploadedCount() {
            return parseInt(localStorage.getItem('uploadedPhotosCount') || '0');
        }

        function updateLimitUI() {
            const count = getUploadedCount();
            if (MAX_PHOTOS > 0) {
                limitInfo.textContent = `Wysłano: ${count} / ${MAX_PHOTOS}`;
                if (count >= MAX_PHOTOS) {
                    triggerBtn.disabled = true;
                    triggerBtn.textContent = "Osiągnięto limit. Dziękujemy!";
                } else {
                    triggerBtn.disabled = false;
                    triggerBtn.textContent = "Zrób zdjęcie lub wybierz z galerii";
                }
            } else {
                limitInfo.textContent = `Wysłano zdjęć: ${count}`;
            }
        }

        // Kliknięcie w nasz przycisk aktywuje ukryte pole systemowe
        triggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Reakcja na wybranie pliku / zrobienie zdjęcia
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (MAX_PHOTOS > 0 && getUploadedCount() >= MAX_PHOTOS) {
                alert("Osiągnąłeś już swój limit zdjęć.");
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            progressContainer.style.display = 'block';
            statusText.textContent = "Wysyłanie zdjęcia na serwer...";
            triggerBtn.style.display = 'none';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`);

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + '%';
                }
            });

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    console.log("Zdjęcie zapisane pod adresem:", response.data.url);
                    statusText.textContent = "Zdjęcie wysłane pomyślnie! Dziękujemy!";
                    
                    let count = getUploadedCount();
                    localStorage.setItem('uploadedPhotosCount', count + 1);
                } else {
                    statusText.textContent = "Wystąpił błąd po stronie serwera.";
                }

                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                    statusText.textContent = "";
                    triggerBtn.style.display = 'block';
                    fileInput.value = ""; 
                    updateLimitUI();
                }, 2500);
            };

            xhr.onerror = () => {
                statusText.textContent = "Błąd połączenia sieciowego.";
                triggerBtn.style.display = 'block';
                progressContainer.style.display = 'none';
            };

            xhr.send(formData);
        });

        // Obsługa przycisku resetu dla Admina
        const adminResetBtn = document.getElementById('btn-admin-reset');
        adminResetBtn.addEventListener('click', () => {
            const pasterz = confirm("Czy na pewno chcesz zresetować aplikację? Usunie to zapisane imię oraz licznik wysłanych zdjęć.");
            if (pasterz) {
                localStorage.clear();
                location.reload(); 
            }
        });

        // Uruchomienie skryptu
        initApp();
    </script>
</body>
</html>
